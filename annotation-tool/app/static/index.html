<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annotation Tool — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    padding: 40px;
    width: 380px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 8px; color: #1a1a1a; }
  p { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
  select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 1rem;
    margin-bottom: 20px;
    background: white;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  .error { color: #dc2626; font-size: 0.85rem; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Legal Annotation Study</h1>
  <p>Select your name to begin annotating query–article relevance pairs.</p>
  <label for="name">Annotator</label>
  <select id="name">
    <option value="">— select name —</option>
    <option>Annotator1</option>
    <option>Annotator2</option>
    <option>Annotator3</option>
  </select>
  <button onclick="login()">Start Annotating</button>
  <div class="error" id="err"></div>
</div>
<script>
async function login() {
  const name = document.getElementById('name').value;
  if (!name) { showErr('Please select your name.'); return; }
  const res = await fetch('/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  if (!res.ok) { showErr('Login failed. Check your name.'); return; }
  const data = await res.json();
  localStorage.setItem('token', data.session_token);
  localStorage.setItem('annotator', data.annotator_name);
  window.location.href = '/annotate';
}
function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}
document.getElementById('name').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
